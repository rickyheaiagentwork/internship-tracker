<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opportunity Tracker — Fellowship & Internship Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ========== CSS RESET & VARIABLES ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #1c2333;
  --bg-card: #1a2235;
  --bg-card-hover: #1e2a42;
  --bg-input: #0d1117;
  --border-color: #30363d;
  --border-focus: #58a6ff;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #6e7681;
  --accent-blue: #58a6ff;
  --accent-purple: #bc8cff;
  --accent-green: #3fb950;
  --accent-orange: #d29922;
  --accent-red: #f85149;
  --accent-cyan: #39d2c0;
  --accent-pink: #f778ba;
  --accent-yellow: #e3b341;
  --accent-gray: #8b949e;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.5);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --transition: 0.2s ease;
}
html { font-size: 15px; scroll-behavior: smooth; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
}
a { color: var(--accent-blue); text-decoration: none; }
a:hover { text-decoration: underline; }
button, select, input, textarea {
  font-family: inherit; font-size: inherit;
}

/* ========== SCROLLBAR ========== */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ========== HEADER ========== */
.app-header {
  background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
  border-bottom: 1px solid var(--border-color);
  padding: 16px 24px;
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(12px);
}
.header-inner {
  max-width: 1440px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
}
.logo-area { display: flex; align-items: center; gap: 12px; }
.logo-icon {
  width: 38px; height: 38px; border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 800; color: #fff;
}
.logo-text { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.5px; }
.logo-sub { font-size: 0.75rem; color: var(--text-secondary); font-weight: 400; margin-top: -2px; }
.header-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

/* ========== BUTTONS ========== */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: var(--radius-sm);
  font-weight: 500; font-size: 0.85rem;
  border: 1px solid transparent; cursor: pointer;
  transition: all var(--transition); white-space: nowrap;
}
.btn-primary {
  background: linear-gradient(135deg, #238636, #2ea043);
  color: #fff; border-color: rgba(46,160,67,0.4);
}
.btn-primary:hover { background: linear-gradient(135deg, #2ea043, #3fb950); }
.btn-secondary {
  background: var(--bg-tertiary); color: var(--text-primary); border-color: var(--border-color);
}
.btn-secondary:hover { background: var(--border-color); }
.btn-danger { background: rgba(248,81,73,0.12); color: var(--accent-red); border-color: rgba(248,81,73,0.3); }
.btn-danger:hover { background: rgba(248,81,73,0.22); }
.btn-ghost {
  background: transparent; color: var(--text-secondary); border: none; padding: 8px 10px;
}
.btn-ghost:hover { color: var(--text-primary); background: rgba(255,255,255,0.06); }
.btn-sm { padding: 5px 12px; font-size: 0.78rem; }
.btn-icon {
  width: 34px; height: 34px; padding: 0; display: inline-flex;
  align-items: center; justify-content: center; border-radius: var(--radius-sm);
  background: var(--bg-tertiary); color: var(--text-secondary); border: 1px solid var(--border-color);
  cursor: pointer; transition: all var(--transition); font-size: 1rem;
}
.btn-icon:hover { color: var(--text-primary); background: var(--border-color); }

/* ========== STATS BAR ========== */
.stats-bar {
  display: flex; gap: 0; overflow-x: auto; padding: 16px 24px;
  max-width: 1440px; margin: 0 auto;
}
.stat-card {
  flex: 1; min-width: 120px; padding: 14px 18px;
  background: var(--bg-secondary); border: 1px solid var(--border-color);
  border-radius: var(--radius-md); text-align: center;
  transition: all var(--transition); cursor: pointer;
}
.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.stat-card.active { border-color: var(--accent-blue); box-shadow: 0 0 0 1px var(--accent-blue); }
.stat-count { font-size: 1.6rem; font-weight: 700; line-height: 1.2; }
.stat-label { font-size: 0.72rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

/* Status badge colors */
.badge-discovered    { background: rgba(139,148,158,0.15); color: #a0adb8; border-color: rgba(139,148,158,0.3); }
.badge-saving        { background: rgba(188,140,255,0.12); color: #bc8cff; border-color: rgba(188,140,255,0.3); }
.badge-tailored-cv   { background: rgba(88,166,255,0.12); color: #79b8ff; border-color: rgba(88,166,255,0.3); }
.badge-applying      { background: rgba(243,162,65,0.12); color: #f0a040; border-color: rgba(243,162,65,0.3); }
.badge-applied       { background: rgba(88,166,255,0.12); color: var(--accent-blue); border-color: rgba(88,166,255,0.3); }
.badge-screened      { background: rgba(63,185,80,0.12); color: #56d364; border-color: rgba(63,185,80,0.3); }
.badge-oa-pending    { background: rgba(243,162,65,0.12); color: var(--accent-orange); border-color: rgba(243,162,65,0.3); }
.badge-oa-done       { background: rgba(57,210,192,0.12); color: var(--accent-cyan); border-color: rgba(57,210,192,0.3); }
.badge-interview     { background: rgba(88,166,255,0.12); color: #79b8ff; border-color: rgba(88,166,255,0.3); }
.badge-tech-int1     { background: rgba(188,140,255,0.12); color: var(--accent-purple); border-color: rgba(188,140,255,0.3); }
.badge-tech-int2     { background: rgba(188,140,255,0.12); color: #d2a8ff; border-color: rgba(188,140,255,0.3); }
.badge-superday      { background: rgba(247,120,186,0.12); color: var(--accent-pink); border-color: rgba(247,120,186,0.3); }
.badge-offer         { background: rgba(63,185,80,0.12); color: var(--accent-green); border-color: rgba(63,185,80,0.3); }
.badge-accepted      { background: rgba(46,160,67,0.15); color: #5ee05e; border-color: rgba(46,160,67,0.4); }
.badge-rejected      { background: rgba(248,81,73,0.12); color: var(--accent-red); border-color: rgba(248,81,73,0.3); }
.badge-waitlisted    { background: rgba(210,153,34,0.12); color: var(--accent-yellow); border-color: rgba(210,153,34,0.3); }
.badge-archived      { background: rgba(139,148,158,0.08); color: var(--text-muted); border-color: rgba(139,148,158,0.2); }

.priority-high   { background: rgba(248,81,73,0.15); color: #f85149; }
.priority-medium  { background: rgba(243,162,65,0.15); color: var(--accent-orange); }
.priority-low     { background: rgba(63,185,80,0.15); color: #3fb950; }

/* ========== FILTER BAR ========== */
.filter-bar {
  display: flex; gap: 10px; padding: 12px 24px 8px; max-width: 1440px; margin: 0 auto;
  flex-wrap: wrap; align-items: center;
}
.filter-group { display: flex; align-items: center; gap: 6px; }
.filter-label { font-size: 0.78rem; color: var(--text-secondary); font-weight: 500; white-space: nowrap; }
.filter-select, .filter-input {
  background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border-color);
  padding: 7px 12px; border-radius: var(--radius-sm); font-size: 0.82rem; cursor: pointer;
  transition: border-color var(--transition); outline: none; min-width: 0;
}
.filter-select:focus, .filter-input:focus { border-color: var(--border-focus); box-shadow: 0 0 0 2px rgba(88,166,255,0.15); }
.filter-select option { background: var(--bg-secondary); color: var(--text-primary); }
.search-box {
  flex: 1; min-width: 200px; position: relative;
}
.search-box input {
  width: 100%; background: var(--bg-tertiary); color: var(--text-primary);
  border: 1px solid var(--border-color); padding: 7px 12px 7px 34px;
  border-radius: var(--radius-sm); font-size: 0.82rem; outline: none;
  transition: border-color var(--transition);
}
.search-box input:focus { border-color: var(--border-focus); box-shadow: 0 0 0 2px rgba(88,166,255,0.15); }
.search-box::before {
  content: '🔍'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  font-size: 0.8rem; pointer-events: none; z-index: 1;
}
.clear-filters {
  background: none; border: none; color: var(--accent-blue); cursor: pointer;
  font-size: 0.78rem; padding: 6px 10px; white-space: nowrap;
}
.clear-filters:hover { text-decoration: underline; }

/* ========== VIEW TOGGLE ========== */
.view-toggle {
  display: flex; gap: 2px; background: var(--bg-tertiary); border-radius: var(--radius-sm); padding: 2px;
  border: 1px solid var(--border-color);
}
.view-btn {
  padding: 6px 14px; border: none; background: transparent; color: var(--text-secondary);
  cursor: pointer; border-radius: 4px; font-size: 0.8rem; transition: all var(--transition);
}
.view-btn.active { background: var(--border-color); color: var(--text-primary); }
.view-btn:hover:not(.active) { color: var(--text-primary); }

/* ========== CARD GRID ========== */
.card-container {
  padding: 16px 24px; max-width: 1440px; margin: 0 auto;
}
.card-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px;
}
.card {
  background: var(--bg-card); border: 1px solid var(--border-color);
  border-radius: var(--radius-md); padding: 20px; position: relative;
  transition: all var(--transition); display: flex; flex-direction: column;
}
.card:hover { background: var(--bg-card-hover); border-color: #484f58; transform: translateY(-2px); box-shadow: var(--shadow-md); }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
.company-name { font-size: 1.05rem; font-weight: 600; color: var(--accent-blue); }
.card-menu-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.1rem; padding: 2px; line-height: 1; }
.card-menu-btn:hover { color: var(--text-primary); }
.role-title { font-size: 0.95rem; font-weight: 500; color: var(--text-primary); margin-bottom: 4px; }
.season-badge, .type-badge {
  display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.68rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.3px; margin-right: 4px; margin-bottom: 6px;
}
.season-summer { background: rgba(255,179,71,0.12); color: #ffb347; }
.season-fall   { background: rgba(88,166,255,0.12); color: var(--accent-blue); }
.season-spring  { background: rgba(63,185,80,0.12); color: #3fb950; }
.type-internship { background: rgba(188,140,255,0.1); color: #d2a8ff; }
.type-fellowship { background: rgba(247,120,186,0.1); color: var(--accent-pink); }
.type-research   { background: rgba(57,210,192,0.1); color: var(--accent-cyan); }
.card-meta { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 12px; font-size: 0.8rem; color: var(--text-secondary); }
.meta-item { display: flex; align-items: center; gap: 4px; }
.card-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.status-badge, .priority-badge {
  padding: 3px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.3px; border: 1px solid;
}
.priority-badge { width: 80px; justify-content: center; }
.card-footer { margin-top: auto; padding-top: 12px; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; gap: 6px; flex-wrap: wrap; }
.card-actions { display: flex; gap: 4px; }
.card-links { font-size: 0.75rem; color: var(--text-muted); }
.card-links a { margin-right: 8px; color: var(--accent-blue); }

/* ========== DROPDOWN MENU ========== */
.dropdown-menu {
  position: absolute; top: 100%; right: 0; background: var(--bg-secondary); border: 1px solid var(--border-color);
  border-radius: var(--radius-sm); box-shadow: var(--shadow-lg); z-index: 50; min-width: 140px; padding: 4px; display: none;
}
.dropdown-menu.show { display: block; }
.dropdown-item {
  display: flex; align-items: center; gap: 8px; width: 100%; padding: 8px 12px;
  background: none; border: none; color: var(--text-primary); cursor: pointer;
  font-size: 0.82rem; border-radius: 4px; text-align: left;
}
.dropdown-item:hover { background: rgba(255,255,255,0.06); }
.dropdown-divider { height: 1px; background: var(--border-color); margin: 4px 0; }

/* ========== CALENDAR VIEW ========== */
.calendar-container { padding: 16px 24px; max-width: 1440px; margin: 0 auto; display: none; }
.calendar-container.active { display: block; }
.calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.calendar-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
}
.calendar-day-name { text-align: center; font-size: 0.72rem; color: var(--text-muted); font-weight: 600; padding: 8px; text-transform: uppercase; }
.calendar-day {
  min-height: 90px; background: var(--bg-secondary); border: 1px solid transparent;
  padding: 6px; transition: all var(--transition);
}
.calendar-day:hover { border-color: var(--border-color); }
.calendar-day.today { background: rgba(88,166,255,0.08); border-color: var(--accent-blue); }
.calendar-day.other-month { opacity: 0.3; }
.day-number { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 4px; }
.deadline-item {
  padding: 2px 6px; border-radius: 3px; font-size: 0.65rem; margin-bottom: 2px;
  background: rgba(248,81,73,0.15); color: #f8a098; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.deadline-item:hover { background: rgba(248,81,73,0.25); }

/* ========== MODAL ========== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 1000;
  display: flex; align-items: center; justify-content: center; padding: 20px;
  opacity: 0; visibility: hidden; transition: all 0.25s ease;
}
.modal-overlay.show { opacity: 1; visibility: visible; }
.modal {
  background: var(--bg-secondary); border: 1px solid var(--border-color);
  border-radius: var(--radius-lg); width: 100%; max-width: 780px; max-height: 90vh;
  display: flex; flex-direction: column; box-shadow: var(--shadow-lg);
}
.modal-header {
  padding: 20px 24px; border-bottom: 1px solid var(--border-color);
  display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
}
.modal-title { font-size: 1.1rem; font-weight: 600; }
.modal-close { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 1.3rem; padding: 4px; line-height: 1; }
.modal-close:hover { color: var(--accent-red); }
.modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
.modal-footer {
  padding: 16px 24px; border-top: 1px solid var(--border-color);
  display: flex; justify-content: flex-end; gap: 8px; flex-shrink: 0;
}
.form-section { margin-bottom: 20px; }
.form-section-title { font-size: 0.78rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; padding-bottom: 4px; border-bottom: 1px solid var(--border-color); }
.form-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
.form-group { display: flex; flex-direction: column; flex: 1; min-width: 0; }
.form-group.half { flex: 0.5; min-width: 160px; }
.form-group.full { flex: 1; }
.form-label { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 4px; font-weight: 500; }
.form-input, .form-select, .form-textarea {
  background: var(--bg-input); color: var(--text-primary); border: 1px solid var(--border-color);
  padding: 9px 12px; border-radius: var(--radius-sm); font-size: 0.85rem; outline: none;
  transition: border-color var(--transition); width: 100%;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--border-focus); box-shadow: 0 0 0 2px rgba(88,166,255,0.12); }
.form-textarea { resize: vertical; min-height: 70px; }
.form-select option { background: var(--bg-secondary); }
.checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.85rem; color: var(--text-primary); }
.checkbox-input { width: 16px; height: 16px; accent-color: var(--accent-green); cursor: pointer; }

/* Array inputs */
.array-list { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
.array-item { display: flex; gap: 6px; align-items: center; }
.array-item .form-input { flex: 1; }
.array-remove {
  background: none; border: none; color: var(--accent-red); cursor: pointer;
  font-size: 1rem; padding: 4px 6px; flex-shrink: 0; opacity: 0.6;
}
.array-remove:hover { opacity: 1; }
.array-add-btn { background: none; border: 1px dashed var(--border-color); color: var(--text-secondary); cursor: pointer; font-size: 0.78rem; padding: 5px 10px; border-radius: var(--radius-sm); width: 100%; text-align: center; margin-top: 4px; }
.array-add-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

/* Sub-object cards */
.sub-object-card {
  background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 8px;
}
.sub-object-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.sub-object-title { font-size: 0.75rem; font-weight: 600; color: var(--accent-blue); }
.sub-object-remove { background: none; border: none; color: var(--accent-red); cursor: pointer; font-size: 0.9rem; }

/* ========== EMPTY STATE ========== */
.empty-state {
  text-align: center; padding: 60px 24px; color: var(--text-secondary);
}
.empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
.empty-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; color: var(--text-primary); }
.empty-desc { font-size: 0.85rem; max-width: 360px; margin: 0 auto; }

/* ========== TOAST ========== */
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: var(--radius-md);
  padding: 12px 18px; box-shadow: var(--shadow-lg); font-size: 0.85rem; color: var(--text-primary);
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards; max-width: 340px;
}
.toast.success { border-left: 3px solid var(--accent-green); }
.toast.error { border-left: 3px solid var(--accent-red); }
@keyframes toastIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-10px); } }

/* ========== TABS (in modal) ========== */
.modal-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border-color); margin-bottom: 16px; flex-wrap: wrap; }
.modal-tab {
  padding: 8px 16px; background: none; border: none; color: var(--text-secondary); cursor: pointer;
  font-size: 0.8rem; font-weight: 500; border-bottom: 2px solid transparent; transition: all var(--transition);
}
.modal-tab.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); }
.modal-tab:hover:not(.active) { color: var(--text-primary); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ========== RESPONSIVE ========== */
@media (max-width: 768px) {
  .app-header { padding: 12px 16px; }
  .stats-bar { padding: 12px 16px; gap: 0; }
  .filter-bar { padding: 10px 16px; gap: 8px; }
  .card-container, .calendar-container { padding: 12px 16px; }
  .card-grid { grid-template-columns: 1fr; }
  .stat-card { min-width: 90px; padding: 10px 12px; }
  .stat-count { font-size: 1.3rem; }
  .form-row { flex-direction: column; gap: 8px; }
  .form-group.half { min-width: 100%; }
  .modal { max-width: 100%; margin: 10px; }
  .header-inner { flex-direction: column; align-items: flex-start; }
}

/* ========== HIDDEN FILE INPUT ========== */
.hidden-input { display: none; }

/* ========== URGENT DEADLINE FLASH ========== */.card.deadline-urgent .card-header { animation: pulse-red 2s ease-in-out infinite; }
@keyframes pulse-red {
  0%, 100% { border-left-color: transparent; }
  50% { border-left-color: var(--accent-red); }
}
.card { border-left: 3px solid transparent; transition: all var(--transition); }
</style>
</head>
<body>

<!-- HEADER -->
<header class="app-header">
  <div class="header-inner">
    <div class="logo-area">
      <div class="logo-icon">O</div>
      <div>
        <div class="logo-text">Opportunity Tracker</div>
        <div class="logo-sub">Internships · Fellowships · Research</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-secondary btn-sm" id="btn-export" title="Export data as JSON">⬇ Export</button>
      <button class="btn btn-secondary btn-sm" id="btn-import" title="Import JSON data">⬆ Import</button>
      <input type="file" id="import-input" accept=".json" class="hidden-input">
      <button class="btn btn-primary" id="btn-add">＋ Add Entry</button>
    </div>
  </div>
</header>

<!-- STATS BAR -->
<div class="stats-bar" id="stats-bar"></div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <div class="filter-group">
    <span class="filter-label">Season:</span>
    <select class="filter-select" id="filter-season">
      <option value="">All Seasons</option>
      <option value="Summer 2027">Summer 2027</option>
      <option value="Fall 2026">Fall 2026</option>
      <option value="Spring 2027">Spring 2027</option>
    </select>
  </div>
  <div class="filter-group">
    <span class="filter-label">Type:</span>
    <select class="filter-select" id="filter-type">
      <option value="">All Types</option>
      <option value="Internship">Internship</option>
      <option value="Fellowship">Fellowship</option>
      <option value="Research-Internship">Research Internship</option>
    </select>
  </div>
  <div class="filter-group">
    <span class="filter-label">Status:</span>
    <select class="filter-select" id="filter-status">
      <option value="">All Statuses</option>
      <option value="Discovered">Discovered</option>
      <option value="Saving">Saving</option>
      <option value="Tailored-CV">Tailored CV</option>
      <option value="Applying">Applying</option>
      <option value="Applied">Applied</option>
      <option value="Screened">Screened</option>
      <option value="OA-Pending">OA Pending</option>
      <option value="OA-Done">OA Done</option>
      <option value="Interview-Scheduled">Interview Scheduled</option>
      <option value="Tech-Int1">Tech Int 1</option>
      <option value="Tech-Int2">Tech Int 2</option>
      <option value="Superday">Superday</option>
      <option value="Offer">Offer</option>
      <option value="Accepted">Accepted</option>
      <option value="Rejected">Rejected</option>
      <option value="Waitlisted">Waitlisted</option>
      <option value="Archived">Archived</option>
    </select>
  </div>
  <div class="filter-group">
    <span class="filter-label">Work:</span>
    <select class="filter-select" id="filter-work-model">
      <option value="">All</option>
      <option value="Remote">Remote</option>
      <option value="Hybrid">Hybrid</option>
      <option value="Onsite">Onsite</option>
    </select>
  </div>
  <div class="filter-group search-box">
    <input type="text" id="filter-search" placeholder="Search company or role…">
  </div>
  <button class="clear-filters" id="btn-clear-filters">Clear all</button>
  <div style="margin-left:auto; display:flex; align-items:center; gap:8px;">
    <span class="filter-label">View:</span>
    <div class="view-toggle">
      <button class="view-btn active" data-view="cards">⊞ Cards</button>
      <button class="view-btn" data-view="calendar">📅 Cal</button>
    </div>
  </div>
</div>

<!-- CARD GRID -->
<div class="card-container" id="view-cards">
  <div class="card-grid" id="card-grid"></div>
</div>

<!-- CALENDAR VIEW -->
<div class="calendar-container" id="view-calendar">
  <div class="calendar-header">
    <button class="btn btn-ghost" id="cal-prev">◀ Prev</button>
    <h3 id="cal-month-year" style="font-size:1.05rem;"></h3>
    <button class="btn btn-ghost" id="cal-next">Next ▶</button>
  </div>
  <div class="calendar-grid" id="cal-grid"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="entry-modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">Add Entry</h2>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-tabs">
        <button class="modal-tab active" data-tab="basic">Basic Info</button>
        <button class="modal-tab" data-tab="details">Details</button>
        <button class="modal-tab" data-tab="projects">Projects</button>
      </div>

      <!-- BASIC TAB -->
      <div class="tab-content active" id="tab-basic">
        <div class="form-row">
          <div class="form-group half">
            <label class="form-label">Company *</label>
            <input type="text" class="form-input" id="f-company" required>
          </div>
          <div class="form-group half">
            <label class="form-label">Role Title *</label>
            <input type="text" class="form-input" id="f-role-title" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group half">
            <label class="form-label">Season</label>
            <select class="form-select" id="f-season">
              <option value="">— select —</option>
              <option value="Summer 2027">Summer 2027</option>
              <option value="Fall 2026">Fall 2026</option>
              <option value="Spring 2027">Spring 2027</option>
            </select>
          </div>
          <div class="form-group half">
            <label class="form-label">Opportunity Type</label>
            <select class="form-select" id="f-opportunity-type">
              <option value="">— select —</option>
              <option value="Internship">Internship</option>
              <option value="Fellowship">Fellowship</option>
              <option value="Research-Internship">Research Internship</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group half">
            <label class="form-label">Status</label>
            <select class="form-select" id="f-status">
              <option value="Discovered">Discovered</option>
              <option value="Saving">Saving</option>
              <option value="Tailored-CV">Tailored CV</option>
              <option value="Applying">Applying</option>
              <option value="Applied">Applied</option>
              <option value="Screened">Screened</option>
              <option value="OA-Pending">OA Pending</option>
              <option value="OA-Done">OA Done</option>
              <option value="Interview-Scheduled">Interview Scheduled</option>
              <option value="Tech-Int1">Tech Int 1</option>
              <option value="Tech-Int2">Tech Int 2</option>
              <option value="Superday">Superday</option>
              <option value="Offer">Offer</option>
              <option value="Accepted">Accepted</option>
              <option value="Rejected">Rejected</option>
              <option value="Waitlisted">Waitlisted</option>
              <option value="Archived">Archived</option>
            </select>
          </div>
          <div class="form-group half">
            <label class="form-label">Work Model</label>
            <select class="form-select" id="f-work-model">
              <option value="">— select —</option>
              <option value="Remote">Remote</option>
              <option value="Hybrid">Hybrid</option>
              <option value="Onsite">Onsite</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group half">
            <label class="form-label">Deadline</label>
            <input type="date" class="form-input" id="f-deadline">
          </div>
          <div class="form-group half">
            <label class="form-label">Priority Score (1-10)</label>
            <input type="number" class="form-input" id="f-priority-score" min="1" max="10" value="5">
          </div>
        </div>
      </div>

      <!-- DETAILS TAB -->
      <div class="tab-content" id="tab-details">
        <div class="form-section-title">Links</div>
        <div class="form-row">
          <div class="form-group full">
            <label class="form-label">Posting Link</label>
            <input type="url" class="form-input" id="f-posting-link" placeholder="https://…">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group half">
            <label class="form-label">Application Link</label>
            <input type="url" class="form-input" id="f-application-link" placeholder="https://…">
          </div>
          <div class="form-group half">
            <label class="form-label">Director Link</label>
            <input type="url" class="form-input" id="f-director-link" placeholder="https://…">
          </div>
        </div>
        <div class="form-section-title" style="margin-top:18px;">Details</div>
        <div class="form-row">
          <div class="form-group half">
            <label class="form-label">Location</label>
            <input type="text" class="form-input" id="f-location">
          </div>
          <div class="form-group half">
            <label class="form-label">Team Name</label>
            <input type="text" class="form-input" id="f-team-name">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="checkbox-label">
              <input type="checkbox" class="checkbox-input" id="f-is-paid"> Paid Opportunity
            </label>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group full">
            <label class="form-label">Compensation Note</label>
            <input type="text" class="form-input" id="f-compensation-note">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group full">
            <label class="form-label">Role Summary</label>
            <textarea class="form-textarea" id="f-role-summary" rows="3"></textarea>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group full">
            <label class="form-label">Cover Letter Hook</label>
            <input type="text" class="form-input" id="f-cover-letter-hook">
          </div>
        </div>
        <div class="form-section-title" style="margin-top:18px;">Key Requirements</div>
        <div class="array-list" id="requirements-list"></div>
        <button class="array-add-btn" onclick="addArrayItem('requirements-list','Req')">+ Add Requirement</button>
        <div class="form-section-title" style="margin-top:18px;">Nice-to-Haves</div>
        <div class="array-list" id="nice-haves-list"></div>
        <button class="array-add-btn" onclick="addArrayItem('nice-haves-list','Nice')">+ Add Nice-to-have</button>
      </div>

      <!-- PROJECTS TAB -->
      <div class="tab-content" id="tab-projects">
        <div class="form-section-title">Suggested Projects for This Opportunity</div>
        <div id="suggested-projects-list"></div>
        <button class="array-add-btn" onclick="addSuggestedProject()">+ Add Suggested Project</button>
        <div class="form-section-title" style="margin-top:18px;">Existing Projects Match</div>
        <div id="existing-projects-match-list"></div>
        <button class="array-add-btn" onclick="addExistingMatch()">+ Add Existing Match</button>
        <div class="form-section-title" style="margin-top:18px; padding-top:12px; border-top:1px solid var(--border-color);">Notes</div>
        <div class="form-row">
          <div class="form-group full">
            <textarea class="form-textarea" id="f-personal-note" rows="3" placeholder="Personal notes, thoughts…"></textarea>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group full">
            <textarea class="form-textarea" id="f-notes" rows="3" placeholder="General notes…"></textarea>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="btn-delete" style="display:none; margin-right:auto;">Delete</button>
      <button class="btn btn-secondary" id="btn-cancel">Cancel</button>
      <button class="btn btn-primary" id="btn-save">Save Entry</button>
    </div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toast-container"></div>

<script src="app.js"></script>
</body>
</html>
